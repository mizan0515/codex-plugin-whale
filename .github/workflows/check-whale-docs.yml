name: NAVER Whale API 문서 확인

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: NAVER Whale API 문서 snapshot 확인
        id: whale-docs
        run: |
          set +e
          node scripts/check-whale-docs.mjs --check --output whale-docs-change.md
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: 문서 변경 issue 생성 또는 갱신
        if: steps.whale-docs.outputs.status != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("whale-docs-change.md", "utf8");
            const marker = "<!-- whale-api-docs-change -->";
            const title = "NAVER Whale API 문서 변경 감지";
            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "docs-sync",
            });
            const issue = existing.data.find((item) => item.title === title);
            if (issue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `${marker}\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: `${marker}\n${body}`,
                labels: ["docs-sync"],
              });
            }

      - name: 문서 변경 시 실패 처리
        if: steps.whale-docs.outputs.status != '0'
        run: exit 1
