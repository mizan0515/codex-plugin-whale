<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Whale Sidebar Codex Sample</title>
    <link rel="stylesheet" href="sidebar.css">
  </head>
  <body>
    <main>
      <header>
        <img src="icons/icon48.png" alt="">
        <div>
          <h1>Whale Sidebar</h1>
          <p id="status">Ready</p>
        </div>
      </header>
      <section>
        <button id="open-mobile" type="button">Open Mobile Target</button>
        <button id="open-space" type="button">Open Space Target</button>
      </section>
      <dl>
        <div>
          <dt>Namespace</dt>
          <dd id="namespace">Checking...</dd>
        </div>
        <div>
          <dt>Opens</dt>
          <dd id="opens">0</dd>
        </div>
      </dl>
    </main>
    <script src="sidebar.js"></script>
  </body>
</html>
